<div id="root"></div>

<script type="text/babel">
// ============================================
// SIMULADOR APV - VERSIÓN SIMPLIFICADA
// ============================================

const { useState, useEffect, useMemo } = React;
const { Info } = lucide;

// VALORES FALLBACK
const FALLBACK_UF = 40801.29;
const FALLBACK_UTM = 71506;

// TASAS AFP
const AFP_RATES = {
  "AFP CAPITAL": 0.0144, "AFP CUPRUM": 0.0144, "AFP HABITAT": 0.0127,
  "AFP MODELO": 0.0058, "AFP PLANVITAL": 0.0116, "AFP PROVIDA": 0.0145,
  "AFP UNO": 0.0046
};
const AFP_LIST = Object.keys(AFP_RATES);
const PERFILES = ["Muy Arriesgado", "Moderado", "Muy Conservador"];

// FACTORES DE RIESGO
const FACTOR1 = {
  "Muy Arriesgado": [1.05,1.1,1.15,1.2,1.26,1.32,1.38,1.44,1.51,1.58,1.66,1.74,1.82,1.9,1.99,2.09,2.18,2.29,2.39,2.51,2.62,2.75,2.88,3.01,3.15,3.3,3.46,3.62,3.79,3.97,4.15,4.35,4.55,4.77,4.99,5.22,5.47,5.73,6,6.28,6.57,6.88,7.21,7.54,7.9,8.27],
  "Moderado": [1.03,1.06,1.09,1.13,1.16,1.2,1.23,1.27,1.31,1.35,1.39,1.43,1.48,1.52,1.57,1.62,1.67,1.72,1.77,1.82,1.88,1.94,2,2.06,2.12,2.18,2.25,2.32,2.39,2.46,2.54,2.62,2.7,2.78,2.86,2.95,3.04,3.13,3.23,3.33,3.43,3.53,3.64,3.75,3.87,3.98],
  "Muy Conservador": [1.02,1.04,1.05,1.06,1.1,1.13,1.15,1.17,1.2,1.22,1.24,1.27,1.29,1.32,1.35,1.37,1.4,1.43,1.46,1.49,1.52,1.55,1.58,1.61,1.64,1.67,1.71,1.74,1.78,1.81,1.85,1.88,1.92,1.96,2,2.04,2.08,2.12,2.16,2.21,2.25,2.3,2.34,2.39,2.44,2.49]
};

const FACTOR2 = {
  "Muy Arriesgado": [12,26,40,54,70,87,105,124,145,167,190,215,241,269,299,331,364,400,439,480,523,570,619,671,727,787,851,918,990,1057,1149,1236,1328,1427,1532,1644,1763,1890,2025,2470,2323,2486,2660,2846,3043,3253],
  "Moderado": [12,25,33,52,67,82,98,115,132,150,169,189,210,232,255,278,303,329,336,384,414,445,477,511,546,583,621,661,703,747,793,841,891,943,998,1055,1115,1177,1242,1311,1382,1456,1534,1615,1700,1789],
  "Muy Conservador": [12,24,37,50,53,76,90,104,118,133,147,162,178,193,209,226,242,259,277,294,312,331,349,368,388,408,428,449,470,491,513,536,558,582,606,630,654,680,705,731,758,785,813,842,871,900]
};

const FACTOR3 = {
  ages: [50,55,60,65,70,75],
  Hombre: [280,251,220,188,156,124],
  Mujer: [310,284,255,224,191,157]
};

function lookupFactor(tabla, perfil, años) {
  const arr = tabla[perfil];
  if (!arr || años < 1) return 0;
  const idx = Math.min(Math.round(años), arr.length) - 1;
  return arr[Math.max(0, idx)] || arr[arr.length - 1];
}

function lookupFactor3(edad, sexo) {
  const arr = sexo === "Masculino" ? FACTOR3.Hombre : FACTOR3.Mujer;
  const ages = FACTOR3.ages;
  let idx = ages.indexOf(edad);
  if (idx === -1) {
    idx = 0;
    for (let i = 0; i < ages.length; i++) if (ages[i] <= edad) idx = i;
  }
  return arr[idx];
}

const CLP = new Intl.NumberFormat("es-CL", { maximumFractionDigits: 0 });
function clp(n) {
  if (!isFinite(n) || n === null || n === undefined) return "—";
  return "$" + CLP.format(Math.round(n));
}
function pct(n, d = 1) {
  if (!isFinite(n) || n === null || n === undefined) return "—";
  return (n * 100).toFixed(d) + "%";
}
function uf(n) {
  if (!isFinite(n) || n === null || n === undefined) return "—";
  return n.toFixed(2) + " UF";
}

// HOOK INDICADORES
function useIndicadores() {
  const [state, setState] = useState({ status: "loading", uf: null, utm: null });
  useEffect(() => {
    let alive = true;
    fetch("https://mindicador.cl/api")
      .then(r => r.json())
      .then(data => {
        if (!alive) return;
        setState({ status: "ok", uf: data.uf?.valor ?? null, utm: data.utm?.valor ?? null });
      })
      .catch(() => { if (alive) setState(s => ({ ...s, status: "error" })); });
    return () => { alive = false; };
  }, []);
  return state;
}

// CÁLCULO PRINCIPAL
function calcular(inputs) {
  const { ufValor, utmValor, rentaBruta, pagoSalud, edad, sexo, afp, apvUF,
          perfilRiesgo, saldoAFP, saldoAPV, edadPension, pensionDeseada } = inputs;

  const afpRate = AFP_RATES[afp] ?? 0;
  const topeAFP_UF = 90;
  const cotizAFP = Math.min(rentaBruta, topeAFP_UF * ufValor) * (0.10 + afpRate);
  const cotizSalud = Math.min(rentaBruta, topeAFP_UF * ufValor) * 0.07;
  const cotizCesantia = Math.min(rentaBruta, 135.2 * ufValor) * 0.006;
  const apvPesos = apvUF * ufValor;

  // SIN APV
  const sinApv = {
    rentaBruta, cotizAFP, cotizSalud, cotizCesantia,
    rentaAfecta: rentaBruta - cotizAFP - cotizSalud - cotizCesantia,
  };
  sinApv.impuesto = sinApv.rentaAfecta * 0.1;
  sinApv.adicionalIsapre = pagoSalud - cotizSalud;
  sinApv.rentaLiquida = sinApv.rentaAfecta - sinApv.impuesto - sinApv.adicionalIsapre;

  // REGIMEN A
  const regA = { ...sinApv, apv: apvPesos };
  regA.rentaLiquida = regA.rentaLiquida - regA.apv;
  regA.beneficioMensual = Math.min(apvPesos * 0.15, (6 * utmValor) / 12);
  regA.aporteCliente = apvPesos;
  regA.rentabilidadInmediata = regA.aporteCliente === 0 ? 0 : regA.beneficioMensual / regA.aporteCliente;

  // REGIMEN B
  const regB = { ...sinApv, apv: apvPesos };
  regB.rentaAfecta = rentaBruta - cotizAFP - cotizSalud - cotizCesantia - apvPesos;
  regB.impuesto = regB.rentaAfecta * 0.1;
  regB.rentaLiquida = regB.rentaAfecta - regB.impuesto - regB.adicionalIsapre;
  regB.beneficioMensual = Math.max(0, Math.min(sinApv.impuesto - regB.impuesto, (600 * ufValor) / 12));
  regB.aporteCliente = apvPesos - regB.beneficioMensual;
  regB.rentabilidadInmediata = regB.aporteCliente === 0 ? 0 : regB.beneficioMensual / regB.aporteCliente;

  // PROYECCIÓN
  const edadPensionFinal = edadPension || (sexo === "Femenino" ? 60 : 65);
  const aniosRestantes = Math.max(edadPensionFinal - edad, 0);
  const factor1 = lookupFactor(FACTOR1, perfilRiesgo, aniosRestantes);
  const factor2 = lookupFactor(FACTOR2, perfilRiesgo, aniosRestantes);
  const divisorRV = lookupFactor3(edadPensionFinal, sexo) || 1;

  const saldoProyectado = (saldoAFP + saldoAPV) * factor1 + cotizAFP * factor2 + apvPesos * factor2;
  const pensionProyectada = divisorRV === 0 ? 0 : saldoProyectado / divisorRV;
  const brechaPension = Math.max(pensionDeseada - pensionProyectada, 0);
  const apvMensualNecesarioUF = factor2 === 0 ? 0 : (brechaPension * divisorRV) / factor2 / ufValor;

  return { sinApv, regA, regB, pension: { aniosRestantes, factor1, factor2, divisorRV, saldoProyectado, pensionProyectada, apvMensualNecesarioUF } };
}

// COMPONENTES UI
function NumberField({ label, value, onChange, suffix, step = 1, min = 0, hint }) {
  const display = value === 0 || value === null || value === undefined ? "" : String(value);
  return React.createElement("label", { style: styles.field },
    React.createElement("span", { style: styles.fieldLabel }, label),
    React.createElement("div", { style: styles.fieldInputWrap },
      React.createElement("input", { type: "number", value: display, min, step, placeholder: "0",
        onChange: e => onChange(e.target.value === "" ? 0 : parseFloat(e.target.value)), style: styles.fieldInput }),
      suffix && React.createElement("span", { style: styles.fieldSuffix }, suffix)
    ),
    hint && React.createElement("span", { style: styles.fieldHint }, hint)
  );
}

function MoneyField({ label, value, onChange, hint, action }) {
  const display = value === 0 || value === null || value === undefined ? "" : CLP.format(value);
  const handleChange = e => {
    const digits = e.target.value.replace(/[^\d]/g, "");
    onChange(digits === "" ? 0 : parseInt(digits, 10));
  };
  return React.createElement("label", { style: styles.field },
    React.createElement("span", { style: styles.fieldLabel }, label),
    React.createElement("div", { style: styles.fieldInputWrap },
      React.createElement("span", { style: styles.fieldSuffix }, "$"),
      React.createElement("input", { type: "text", inputMode: "numeric", value: display, placeholder: "0",
        onChange: handleChange, style: styles.fieldInput })
    ),
    hint && React.createElement("span", { style: styles.fieldHint }, hint),
    action
  );
}

function SelectField({ label, value, onChange, options }) {
  return React.createElement("label", { style: styles.field },
    React.createElement("span", { style: styles.fieldLabel }, label),
    React.createElement("select", { value, onChange: e => onChange(e.target.value), style: styles.fieldSelect },
      options.map(o => React.createElement("option", { key: o, value: o }, o.replace("AFP ", "")))
    )
  );
}

function ResultRow({ label, a, b, fmt = clp, highlight }) {
  return React.createElement("tr", { style: highlight ? styles.resultRowHighlight : undefined },
    React.createElement("td", { style: styles.resultLabel }, label),
    React.createElement("td", { style: styles.resultCell }, fmt(a)),
    React.createElement("td", { style: { ...styles.resultCell, ...styles.resultCellB } }, fmt(b))
  );
}

// COMPONENTE PRINCIPAL
function APVSimulator() {
  const econ = useIndicadores();
  const ufValor = econ.uf ?? FALLBACK_UF;
  const utmValor = econ.utm ?? FALLBACK_UTM;

  const [rentaBruta, setRentaBruta] = useState(1500000);
  const [pagoSalud, setPagoSalud] = useState(Math.round(1500000 * 0.07));
  const [pagoSaludManual, setPagoSaludManual] = useState(false);
  const [edad, setEdad] = useState(40);
  const [sexo, setSexo] = useState("Masculino");
  const [afp, setAfp] = useState(AFP_LIST[0]);
  const [apvUF, setApvUF] = useState(5);
  const [perfilRiesgo, setPerfilRiesgo] = useState("Moderado");
  const [saldoAFP, setSaldoAFP] = useState(0);
  const [saldoAPV, setSaldoAPV] = useState(0);
  const [edadPension, setEdadPension] = useState(0);
  const [pensionDeseada, setPensionDeseada] = useState(1000000);

  useEffect(() => {
    if (!pagoSaludManual) setPagoSalud(Math.round(Math.min(rentaBruta, 90 * ufValor) * 0.07));
  }, [rentaBruta, ufValor, pagoSaludManual]);

  const result = useMemo(() => calcular({
    ufValor, utmValor, rentaBruta, pagoSalud, edad, sexo, afp, apvUF,
    perfilRiesgo, saldoAFP, saldoAPV, edadPension, pensionDeseada
  }), [ufValor, utmValor, rentaBruta, pagoSalud, edad, sexo, afp, apvUF,
      perfilRiesgo, saldoAFP, saldoAPV, edadPension, pensionDeseada]);

  const saludMinima = Math.round(Math.min(rentaBruta, 90 * ufValor) * 0.07);
  const rentaMinimaRegB = 4781420;

  // Usamos React.createElement para evitar JSX
  return React.createElement("div", { style: styles.page },
    React.createElement("div", { style: styles.container },
      // HEADER
      React.createElement("div", { style: styles.headerRow },
        React.createElement("div", { style: styles.headerLeft },
          React.createElement("div", { style: styles.logoMark },
            React.createElement("img", { src: "icons/icon-192.png", alt: "RNCO", style: { width: "100%", height: "100%", objectFit: "contain" } })
          ),
          React.createElement("div", null,
            React.createElement("h1", { style: styles.title },
              React.createElement("span", { style: styles.logoBR }, "RNCO"),
              " ",
              React.createElement("span", { style: styles.logoWord }, "APV Simulator")
            ),
            React.createElement("div", { style: styles.subtitle }, "Régimen A vs. Régimen B · Proyección de pensión")
          )
        )
      ),

      // DATOS DEL CLIENTE
      React.createElement("div", { className: "ft-card", style: styles.card },
        React.createElement("div", { style: styles.cardTitle }, "Datos del cliente"),
        React.createElement("div", { style: styles.formGrid },
          React.createElement(MoneyField, { label: "Renta bruta mensual", value: rentaBruta, onChange: setRentaBruta }),
          React.createElement(MoneyField, {
            label: "Pago salud (Isapre)",
            value: pagoSalud,
            onChange: v => { setPagoSalud(v); setPagoSaludManual(true); },
            hint: `Mínimo legal (7%): ${clp(saludMinima)}`,
            action: pagoSaludManual && React.createElement("button", {
              type: "button",
              onClick: () => { setPagoSaludManual(false); setPagoSalud(saludMinima); },
              style: styles.linkButton
            }, "usar mínimo (7%)")
          }),
          React.createElement(NumberField, { label: "Edad", value: edad, onChange: setEdad, min: 18, step: 1 }),
          React.createElement(SelectField, { label: "Sexo", value: sexo, onChange: setSexo, options: ["Masculino", "Femenino"] }),
          React.createElement(SelectField, { label: "AFP", value: afp, onChange: setAfp, options: AFP_LIST }),
          React.createElement(NumberField, { label: "Aporte APV mensual", value: apvUF, onChange: setApvUF, suffix: "UF", step: 0.5, hint: `≈ ${clp(apvUF * ufValor)} / mes` })
        ),
        rentaBruta > 0 && rentaBruta < rentaMinimaRegB && React.createElement("div", { style: styles.warning },
          React.createElement(Info, { size: 14 }),
          React.createElement("span", null, `Con esta renta, el Régimen B normalmente no conviene — referencia: ${clp(rentaMinimaRegB)}.`)
        )
      ),

      // PROYECCIÓN
      React.createElement("div", { className: "ft-card", style: styles.card },
        React.createElement("div", { style: styles.cardTitle }, "Proyección de pensión"),
        React.createElement("div", { style: styles.formGrid },
          React.createElement(SelectField, { label: "Perfil de riesgo", value: perfilRiesgo, onChange: setPerfilRiesgo, options: PERFILES }),
          React.createElement(MoneyField, { label: "Saldo actual AFP", value: saldoAFP, onChange: setSaldoAFP }),
          React.createElement(MoneyField, { label: "Saldo actual APV + DC", value: saldoAPV, onChange: setSaldoAPV }),
          React.createElement(NumberField, { label: "Edad de pensión (opcional)", value: edadPension, onChange: setEdadPension, step: 1, hint: "vacío = default" }),
          React.createElement(MoneyField, { label: "Pensión mensual deseada", value: pensionDeseada, onChange: setPensionDeseada })
        ),
        result && React.createElement("div", { style: styles.pensionGrid },
          React.createElement("div", { style: styles.pensionStat },
            React.createElement("span", { style: styles.pensionStatLabel }, "Años restantes"),
            React.createElement("span", { style: styles.pensionStatValue }, result.pension.aniosRestantes)
          ),
          React.createElement("div", { style: styles.pensionStat },
            React.createElement("span", { style: styles.pensionStatLabel }, "Pensión proyectada"),
            React.createElement("span", { style: styles.pensionStatValue }, clp(result.pension.pensionProyectada))
          ),
          React.createElement("div", { style: { ...styles.pensionStat, ...styles.pensionStatAccent } },
            React.createElement("span", { style: styles.pensionStatLabel }, "APV mensual necesario"),
            React.createElement("span", { style: styles.pensionStatValue }, uf(result.pension.apvMensualNecesarioUF)),
            ufValor > 0 && React.createElement("span", { style: styles.pensionStatSub }, `≈ ${clp(result.pension.apvMensualNecesarioUF * ufValor)} / mes`)
          )
        ),
        React.createElement("div", { style: styles.footnote }, "Proyección referencial: capitaliza el saldo actual y los aportes mensuales según el perfil de riesgo. No reemplaza una certificación de tu AFP.")
      ),

      // COMPARACIÓN
      result && rentaBruta > 0 && React.createElement("div", { className: "ft-card", style: styles.card },
        React.createElement("div", { style: styles.cardTitle }, "Comparación de beneficios"),
        React.createElement("div", { style: { overflowX: "auto" } },
          React.createElement("table", { style: styles.resultTable },
            React.createElement("thead", null,
              React.createElement("tr", null,
                React.createElement("th", { style: styles.resultHeadLabel }),
                React.createElement("th", { style: styles.resultHead }, "Régimen A"),
                React.createElement("th", { style: { ...styles.resultHead, ...styles.resultHeadB } }, "Régimen B")
              )
            ),
            React.createElement("tbody", null,
              React.createElement(ResultRow, { label: "Renta bruta mensual", a: result.regA.rentaBruta, b: result.regB.rentaBruta }),
              React.createElement(ResultRow, { label: "Cotización AFP", a: -result.regA.cotizAFP, b: -result.regB.cotizAFP }),
              React.createElement(ResultRow, { label: "Cotización salud", a: -result.regA.cotizSalud, b: -result.regB.cotizSalud }),
              React.createElement(ResultRow, { label: "Seguro cesantía", a: -result.regA.cotizCesantia, b: -result.regB.cotizCesantia }),
              React.createElement(ResultRow, { label: "Aporte APV", a: -result.regA.apv, b: -result.regB.apv }),
              React.createElement(ResultRow, { label: "Renta afecta", a: result.regA.rentaAfecta, b: result.regB.rentaAfecta, highlight: true }),
              React.createElement(ResultRow, { label: "Impuesto único", a: -result.regA.impuesto, b: -result.regB.impuesto }),
              React.createElement(ResultRow, { label: "Adicional Isapre", a: -result.regA.adicionalIsapre, b: -result.regB.adicionalIsapre }),
              React.createElement(ResultRow, { label: "Renta líquida", a: result.regA.rentaLiquida, b: result.regB.rentaLiquida, highlight: true }),
              React.createElement("tr", null, React.createElement("td", { colSpan: 3, style: { height: 8 } })),
              React.createElement(ResultRow, { label: "Beneficio APV mensual", a: result.regA.beneficioMensual, b: result.regB.beneficioMensual }),
              React.createElement(ResultRow, { label: "Aporte neto cliente", a: result.regA.aporteCliente, b: result.regB.aporteCliente }),
              React.createElement(ResultRow, { label: "Rentabilidad inmediata", a: result.regA.rentabilidadInmediata, b: result.regB.rentabilidadInmediata, fmt: pct, highlight: true })
            )
          )
        ),
        React.createElement("div", { style: styles.footnote }, "* Régimen A: bonificación estatal 15% del aporte. Régimen B: ahorro de impuesto con tope de 600 UF/año.")
      ),

      React.createElement("div", { style: styles.pageFooter }, "RNCO APV Simulator — UF/UTM en vivo vía mindicador.cl. Cálculos referenciales.")
    )
  );
}

const styles = {

  logoMark: { width: 46, height: 46, borderRadius: 13, background: "#0a0a0a", border: "1px solid #232a33", display: "flex", alignItems: "center", justifyContent: "center", flexShrink: 0, padding: 4 },

  field: { display: "flex", flexDirection: "column", gap: 6 },
  fieldLabel: { fontSize: 12, color: "#8a929d" },
